/**:
  ros__parameters:
    trajectory: horizontal
    return_mode: none
    laps: 1

    # Home is expressed in the active odometry frame.
    home_x: 0.0
    home_y: 0.0
    home_yaw_deg: 0.0
    go_home_first: true

    columns: 8
    rows: 5
    spacing_x: 1.0
    spacing_y: 1.0
    dwell_seconds: 0.5

    cmd_vel_topic: cmd_vel
    odom_topic: ""

    max_linear_speed: 0.30
    min_linear_speed: 0.06
    max_angular_speed: 0.70
    linear_gain: 0.80
    angular_gain: 1.80
    position_tolerance: 0.08
    yaw_tolerance_deg: 3.0
    turn_in_place_angle_deg: 31.5
    control_rate: 20.0
    odom_timeout: 1.0
