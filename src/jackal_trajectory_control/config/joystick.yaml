/**:
  ros__parameters:
    trajectory_modes: [horizontal, vertical, inverse]
    initial_mode: horizontal
    return_mode: reverse
    laps: 1
    go_home_first: true

    columns: 8
    rows: 5
    spacing_x: 1.0
    spacing_y: 1.0
    dwell_seconds: 0.5

    # Relative names are resolved under /j100_0751 by the launch namespace.
    cmd_vel_topic: cmd_vel
    odom_topic: platform/odom/filtered
    joy_topic: joy_teleop/joy
    status_topic: trajectory/status

    # PlayStation controller mapping measured on j100_0751.
    button_x: 0
    button_circle: 1
    button_square: 2
    button_triangle: 3
    button_l1: 9
    button_r1: 10

    # Triangle press cancels immediately. Holding it starts return-to-home.
    triangle_hold_seconds: 1.0
    return_requires_hold: true

    # Conservative real-robot defaults for the first room test.
    max_linear_speed: 0.20
    min_linear_speed: 0.05
    max_angular_speed: 0.40
    linear_gain: 0.80
    angular_gain: 1.80
    position_tolerance: 0.15
    yaw_tolerance_deg: 8.0
    turn_in_place_angle_deg: 31.5
    control_rate: 20.0
    odom_timeout: 1.0
